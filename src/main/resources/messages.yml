#   Hex colour: &#

prefix: "&8[&bGiftcodeX&8] "

# Symbol displayed when a value is unlimited (player-max-uses: -1) or has no expiry
# You can change this to any character, "∞", "Unlimited", "Forever", "N/A"
infinity-symbol: "∞"


